<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mir's Blog</title>
    <link rel="stylesheet" href="../css/common.css" />
    <link rel="stylesheet" href="../css/blog.css" />
    <link rel="icon" href="../image/nori/icon.PNG" type="image/x-icon" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  </head>
  <body>
    <header>
      <div class="logo"><img src="../image/nori/icon.PNG" class="logo-img" /></div>
      <nav class="header-nav">
        <a href="/" title="home" class="nav-button">Home</a>
        <a href="/my-characters" title="my character" class="nav-button">Character</a>
        <a href="/blog" title="my blog" class="nav-button">Blog</a>
        <a href="/whoami" title="About me" class="nav-button">About</a>
        <a id="auth-btn" href="login" class="nav-button">로그인</a>
      </nav>
    </header>

    <main class="blog-container">
      <h1 class="blog-title">Mir's Daily Log</h1>
      <p class="blog-subtitle">개발, 캐릭터, 그리고 일상 이야기</p>

      <!-- 글쓰기 버튼 -->
      <div style="text-align: right; margin-bottom: 2rem">
        <a
          href="/blog-write"
          id="write-btn"
          style="
            display: none;
            background: #333;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
          "
          >✍️ 글쓰기</a
        >
      </div>

      <div class="post-grid" id="post-grid-container">
        <p style="text-align: center; padding: 2rem">게시글을 불러오는 중입니다...</p>
      </div>
    </main>

    <footer id="footer">
      <p id="copyright">ⓒ 2025 Mir All rights reserved.</p>
    </footer>
    <script type="module" src="../js/auth.js"></script>
    <script type="module" src="../js/blog.js"></script>
  </body>
</html>
