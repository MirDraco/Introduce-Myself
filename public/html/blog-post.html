<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Masonry 레이아웃 도전기 - Mir's Blog</title>
    <link rel="stylesheet" href="../css/common.css" />
    <link rel="stylesheet" href="../css/blog.css" />
    <link rel="icon" href="../image/nori/icon.PNG" type="image/x-icon" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  </head>
  <body>
    <header>
      <div class="logo"><img src="../image/nori/icon.PNG" class="logo-img" /></div>
      <nav class="header-nav">
        <a href="../html/index.html" title="home" class="nav-button">Home</a>
        <a href="../html/my-characters.html" title="my character" class="nav-button">Character</a>
        <a href="../html/blog.html" title="my blog" class="nav-button">Blog</a>
        <a href="../html/whoami.html" title="About me" class="nav-button">About</a>
      </nav>
    </header>

    <main class="blog-post-container">
      <!-- 목록으로 돌아가기 버튼 -->
      <a href="/blog" class="back-link">← 목록으로 돌아가기</a>

      <div id="post-loading" style="text-align: center; padding: 2rem">게시글을 불러오는 중입니다...</div>

      <article id="single-post-article" style="display: none">
        <div class="post-header">
          <span class="post-meta" id="post-date"></span>
          <h1 id="post-title"></h1>
          <span class="post-meta" id="post-author">By </span>

          <!-- 삭제 버튼 (기본적으로 숨겨둠, 권한 확인 후 JS에서 보여줌) -->
          <button
            id="delete-post-btn"
            style="
              display: none;
              background-color: #ff4d4d;
              color: white;
              border: none;
              padding: 5px 10px;
              border-radius: 3px;
              cursor: pointer;
              margin-top: 10px;
            ">
            🗑️ 이 글 삭제하기
          </button>
        </div>

        <div class="post-body">
          <div id="post-image-container" style="text-align: center; margin-bottom: 2rem"></div>
          <p id="post-content" style="white-space: pre-wrap; line-height: 1.6"></p>
        </div>
      </article>
    </main>

    <footer id="footer">
      <p id="copyright">ⓒ 2025 Mir All rights reserved.</p>
    </footer>
    <script type="module" src="../js/auth.js"></script>
    <script type="module" src="../js/blog-post.js"></script>
  </body>
</html>
