<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>블로그 글쓰기 - Mir's Blog</title>
    <link rel="stylesheet" href="../css/common.css" />
    <link rel="stylesheet" href="../css/blog.css" />
    <link rel="icon" href="../image/nori/icon.PNG" type="image/x-icon" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
      .write-container {
        max-width: 800px;
        margin: 2rem auto;
        padding: 2rem;
        background: #2c2c2c; /* 다크 테마 배경 */
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.5);
        color: #fff; /* 글자색을 흰색으로 */
      }
      .form-group {
        margin-bottom: 1.5rem;
      }
      .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: bold;
      }
      .form-group input[type="text"],
      .form-group textarea {
        width: 100%;
        padding: 0.8rem;
        border: 1px solid #555;
        background-color: #1a1a1a; /* 입력창 배경 어둡게 */
        color: #fff; /* 입력창 글자 흰색 */
        border-radius: 5px;
        font-size: 1rem;
      }
      .form-group input[type="text"]::placeholder,
      .form-group textarea::placeholder {
        color: #888; /* 플레이스홀더 색상 조정 */
      }
      .form-group textarea {
        min-height: 300px;
        resize: vertical;
      }
      .btn-submit {
        background-color: #555; /* 버튼 색상 */
        color: white;
        padding: 0.8rem 1.5rem;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 1rem;
      }
      .btn-submit:hover {
        background-color: #777;
      }
      .file-input-wrapper {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .file-upload-btn {
        background-color: #444; /* 파일 버튼 배경 */
        color: #fff;
        padding: 0.6rem 1rem;
        border-radius: 5px;
        border: 1px solid #555;
        cursor: pointer;
        font-size: 0.9rem;
      }
      .file-upload-btn:hover {
        background-color: #666;
      }
      .file-name-display {
        color: #aaa; /* 파일 이름 표시 색상 */
        font-size: 0.9rem;
      }
      .auth-status {
        margin: 0 0 1.2rem;
        padding: 0.7rem 0.9rem;
        border-radius: 6px;
        font-size: 0.95rem;
        background: #1f1f1f;
        border: 1px solid #444;
        color: #d7d7d7;
      }
      .auth-status[data-state="ok"] {
        border-color: #2e7d32;
        color: #c8e6c9;
      }
      .auth-status[data-state="required"] {
        border-color: #c62828;
        color: #ffcdd2;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo"><img src="../image/nori/icon.PNG" class="logo-img" /></div>
      <nav class="header-nav">
        <a href="/" title="home" class="nav-button">Home</a>
        <a href="/my-characters" title="my character" class="nav-button">Character</a>
        <a href="/blog" title="my blog" class="nav-button">Blog</a>
        <a href="/whoami" title="About me" class="nav-button">About</a>
        <a id="auth-btn" href="login" class="nav-button">로그인</a>
      </nav>
    </header>

    <main class="write-container">
      <h1 class="blog-title">새 글 작성</h1>
      <p id="auth-status" class="auth-status" data-state="checking" role="status" aria-live="polite">
        로그인 상태 확인 중...
      </p>
      <form id="blog-write-form">
        <div class="form-group">
          <label for="post-title">제목</label>
          <input type="text" id="post-title" required placeholder="글 제목을 입력하세요" disabled />
        </div>
        <div class="form-group">
          <label for="post-image">대표 이미지 첨부</label>
          <div class="file-input-wrapper">
            <label for="post-image" class="file-upload-btn">사진 선택</label>
            <input type="file" id="post-image" accept="image/*" style="display: none" disabled />
            <span id="file-name-display" class="file-name-display">선택된 파일 없음</span>
          </div>
        </div>
        <div class="form-group">
          <label for="post-content">내용</label>
          <textarea id="post-content" required placeholder="본문을 입력하세요" disabled></textarea>
        </div>
        <button type="submit" class="btn-submit" id="submit-btn" disabled>글 등록하기</button>
      </form>
    </main>

    <footer id="footer">
      <p id="copyright">ⓒ 2025 Mir All rights reserved.</p>
    </footer>

    <!-- 파일 크기를 줄여주는 압축 라이브러리 추가 -->
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.umd.js"></script>

    <!-- 기존 Firebase 설정 및 글쓰기 로직 모듈 -->
    <script type="module" src="../js/blog-write.js"></script>
  </body>
</html>
